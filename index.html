<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ツキフダ 〜月夜の十二番勝負〜</title>
<link rel="stylesheet" href="css/style.css?v=4">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%23f5e6a8'/></svg>">
</head>
<body>

<!-- タイトル画面 -->
<section id="screen-title" class="screen active">
  <div class="title-moon"></div>
  <h1 class="game-title"><span>ツキフダ</span></h1>
  <p class="subtitle">〜 月夜の十二番勝負 〜</p>
  <nav class="menu">
    <button class="btn" data-action="cpu-novice">ひとりで遊ぶ（CPU: 見習い妖怪）</button>
    <button class="btn" data-action="cpu-hard">ひとりで遊ぶ（CPU: 大妖怪）</button>
    <button class="btn" data-action="story">ストーリーモード（月夜の五番勝負）</button>
    <button class="btn" data-action="online">ふたりで遊ぶ（オンライン対戦）</button>
    <button class="btn btn-sub" data-action="rules">遊び方</button>
  </nav>
  <p class="credit">同じ12枚の手札で読み合う、月光点の争奪戦。</p>
  <div id="title-stats" class="title-stats"></div>
  <div class="shooting-star" style="--delay:2s; --top:12%"></div>
  <div class="shooting-star" style="--delay:9s; --top:30%"></div>
</section>

<!-- ルール画面（ページ式チュートリアル） -->
<section id="screen-rules" class="screen">
  <div class="rules-panel">
    <h2>遊び方</h2>
    <div id="rules-body"></div>
    <div class="rules-nav">
      <button class="btn btn-sub" id="rules-prev">← 前へ</button>
      <span id="rules-dots" class="rules-dots"></span>
      <button class="btn btn-sub" id="rules-next">次へ →</button>
    </div>
    <button class="btn" id="rules-back" data-action="rules-back">タイトルへ戻る</button>
  </div>
</section>

<!-- ストーリー画面 -->
<section id="screen-story" class="screen">
  <div class="story-panel">
    <h2>月夜の五番勝負</h2>
    <p class="story-lead">妖怪たちを退け、夜の頂に立つ月読命へ挑め。</p>
    <div id="boss-list" class="boss-list"></div>
    <button class="btn btn-sub" data-action="back-title">タイトルへ戻る</button>
  </div>
</section>

<!-- オンラインロビー -->
<section id="screen-lobby" class="screen">
  <div class="lobby-panel">
    <h2>オンライン対戦</h2>
    <div class="lobby-row">
      <button class="btn" id="btn-host">部屋を作る</button>
      <div id="host-info" class="hidden">
        <p>合言葉を相手に伝えてください：</p>
        <p class="room-code" id="room-code"></p>
        <p class="waiting">相手の参加を待っています…</p>
      </div>
    </div>
    <div class="lobby-divider">または</div>
    <div class="lobby-row">
      <input type="text" id="join-code" maxlength="5" placeholder="合言葉（5文字）" autocomplete="off">
      <button class="btn" id="btn-join">部屋に入る</button>
    </div>
    <p id="lobby-status" class="lobby-status"></p>
    <button class="btn btn-sub" data-action="back-title">タイトルへ戻る</button>
  </div>
</section>

<!-- ゲーム画面 -->
<section id="screen-game" class="screen">
  <button id="btn-pause" class="pause-toggle" title="メニュー">☰</button>
  <div class="game-layout">
    <div class="opp-area">
      <div class="player-label"><span id="opp-name">相手</span> <span class="score-badge" id="opp-score">0</span>
        <span class="emote-bubble hidden" id="emote-opp"></span>
      </div>
      <div class="opp-hand" id="opp-hand"></div>
    </div>

    <div class="table-area">
      <div class="phase-track" id="phase-track"></div>
      <div class="battle-zone">
        <div class="played-slot" id="slot-opp"></div>
        <div class="center-info">
          <div class="round-label" id="round-label"></div>
          <div class="stake-label" id="stake-label"></div>
          <div class="pot-label" id="pot-label"></div>
        </div>
        <div class="played-slot" id="slot-me"></div>
      </div>
      <div class="log" id="log"></div>
    </div>

    <div class="my-area">
      <div class="player-label"><span id="my-name">あなた</span> <span class="score-badge" id="my-score">0</span> <span id="my-buff" class="buff-badge hidden">次+2</span>
        <span class="emote-bubble hidden" id="emote-me"></span>
        <span class="emote-bar hidden" id="emote-bar"></span>
      </div>
      <div class="my-hand" id="my-hand"></div>
      <div class="action-bar">
        <button class="btn btn-confirm hidden" id="btn-confirm">このカードで勝負！</button>
        <span id="turn-hint" class="turn-hint"></span>
      </div>
    </div>
  </div>
  <div class="card-tooltip hidden" id="card-tooltip"></div>
</section>

<div id="fx-overlay" class="fx-overlay"></div>
<button id="btn-sound" class="sound-toggle" title="効果音の切り替え">🔊</button>
<button id="btn-music" class="sound-toggle music-toggle" title="BGMの切り替え">🎵</button>

<!-- 結果オーバーレイ -->
<div id="result-overlay" class="overlay hidden">
  <div class="result-panel">
    <h2 id="result-title"></h2>
    <p id="result-detail"></p>
    <p id="result-story-msg" class="result-story-msg hidden"></p>
    <div class="result-buttons">
      <button class="btn" id="btn-rematch">もう一回</button>
      <button class="btn hidden" id="btn-story-back">ストーリーへ</button>
      <button class="btn btn-sub" data-action="back-title">タイトルへ</button>
    </div>
  </div>
</div>

<!-- 中断メニュー -->
<div id="pause-overlay" class="overlay hidden">
  <div class="result-panel pause-panel">
    <h2>ひとやすみ</h2>
    <div class="pause-buttons">
      <button class="btn" id="btn-resume">対戦に戻る</button>
      <button class="btn" id="btn-pause-rules">ルールを見る</button>
      <button class="btn" id="btn-pause-sound">効果音</button>
      <button class="btn" id="btn-pause-bgm">BGM</button>
      <button class="btn btn-sub" id="btn-forfeit">投了する</button>
    </div>
  </div>
</div>

<!-- ストーリー会話オーバーレイ -->
<div id="dialogue-overlay" class="overlay hidden">
  <div class="dialogue-box" id="dialogue-box">
    <div class="dialogue-portrait" id="dialogue-portrait"></div>
    <div class="dialogue-body">
      <div class="dialogue-name" id="dialogue-name"></div>
      <p class="dialogue-text" id="dialogue-text"></p>
      <div class="dialogue-hint">クリックで進む ▼</div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"
        integrity="sha384-nlUQ8ZqCbvStErob+biJNzSgltf6urV3VGqhfIfzhmg9RXmpeRm76ELw0pYnKlTR"
        crossorigin="anonymous"></script>
<script src="js/cards.js?v=4"></script>
<script src="js/sound.js?v=4"></script>
<script src="js/fx.js?v=4"></script>
<script src="js/engine.js?v=4"></script>
<script src="js/ai.js?v=4"></script>
<script src="js/story.js?v=4"></script>
<script src="js/ui.js?v=4"></script>
<script src="js/online.js?v=4"></script>
<script src="js/main.js?v=4"></script>
</body>
</html>
